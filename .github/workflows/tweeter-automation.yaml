name: tweeter-automation

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.*'
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # --------------------------
  # Run Go tests on multiple OS
  # --------------------------
  test:
    permissions:
      contents: read
    strategy:
      matrix:
        go-version: [1.24.4]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test ./...

  # --------------------------
  # Test the Dockerized action
  # --------------------------
  test-action:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Login to GitHub Container Registry (required for private images)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: alisina-1231
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull the Docker image from GHCR
      - name: Pull Docker image
        run: |
          IMAGE_TAG=latest
          docker pull ghcr.io/alisina-1231/tweet:latest
      # Run the action in DRY_RUN mode using the pulled image
      - name: Run the tweeter Docker image in DRY_RUN
        run: |
          docker run --rm \
            -e DRY_RUN=true \
            ghcr.io/${{ github.repository_owner }}/tweet:latest \
            --message "hello world!" \
            --apiKey fake \
            --apiKeySecret fake \
            --accessToken fake \
            --accessTokenSecret fake

  # --------------------------
  # Release job: build & release binaries
  # --------------------------
  release:
    permissions:
      contents: write
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set RELEASE_VERSION ENV var
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.4

      - name: Install gox
        run: go install github.com/mitchellh/gox@v1.0.1

      - name: Build cross-platform binaries
        env:
          PLATFORMS: darwin/amd64 darwin/arm64 windows/amd64 linux/amd64 linux/arm64
          VERSION_INJECT: github.com/alisina-1231/action_test/pkg/tweeter.Version
          OUTPUT_PATH_FORMAT: ./bin/${{ env.RELEASE_VERSION }}/{{.OS}}/{{.Arch}}/tweeter
        run: |
          gox -osarch="${PLATFORMS}" \
          -ldflags "-X ${VERSION_INJECT}=${RELEASE_VERSION}" \
          -output "${OUTPUT_PATH_FORMAT}"

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST repos/${{ github.repository }}/releases/generate-notes \
            -F tag_name=${{ env.RELEASE_VERSION }} \
            > tmp-release-notes.json

      - name: Gzip binaries
        env:
          OUT_BASE: ./bin/${{ env.RELEASE_VERSION }}
        run: |
          tar -czvf "${OUT_BASE}/darwin/amd64/tweeter_darwin_amd64.tar.gz" -C "${OUT_BASE}/darwin/amd64" tweeter
          tar -czvf "${OUT_BASE}/darwin/arm64/tweeter_darwin_arm64.tar.gz" -C "${OUT_BASE}/darwin/arm64" tweeter
          tar -czvf "${OUT_BASE}/windows/amd64/tweeter_windows_amd64.tar.gz" -C "${OUT_BASE}/windows/amd64" tweeter.exe
          tar -czvf "${OUT_BASE}/linux/amd64/tweeter_linux_amd64.tar.gz" -C "${OUT_BASE}/linux/amd64" tweeter
          tar -czvf "${OUT_BASE}/linux/arm64/tweeter_linux_arm64.tar.gz" -C "${OUT_BASE}/linux/arm64" tweeter

      - name: Create GitHub release
        env:
          OUT_BASE: ./bin/${{ env.RELEASE_VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -r .body tmp-release-notes.json > tmp-release-notes.md
          gh release create ${{ env.RELEASE_VERSION }} \
            -F tmp-release-notes.md \
            "${OUT_BASE}/darwin/amd64/tweeter_darwin_amd64.tar.gz" \
            "${OUT_BASE}/darwin/arm64/tweeter_darwin_arm64.tar.gz" \
            "${OUT_BASE}/windows/amd64/tweeter_windows_amd64.tar.gz" \
            "${OUT_BASE}/linux/amd64/tweeter_linux_amd64.tar.gz" \
            "${OUT_BASE}/linux/arm64/tweeter_linux_arm64.tar.gz"
